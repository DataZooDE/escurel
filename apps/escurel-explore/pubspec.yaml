name: escurel_explore
description: General editor for escurel — explores every backend capability as it lands.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.5.1

  # Routing — wired in PR-5
  go_router: ^14.6.0

  # Typography
  google_fonts: ^6.2.1

  # YAML for frontmatter parsing (mirrors escurel-md's serde_yaml_ng)
  yaml: ^3.1.2

  # HTTP client for the MCP-over-HTTP transport (escurel-server, M3+)
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Used by the FixtureEscurelClient VM test to locate examples/crm-demo/
  # when the examples branch is merged. Tests gracefully skip the
  # directory pass when examples/ is absent (stacked PR mode).
  path: ^1.9.0

flutter:
  uses-material-design: true
