# nginx config for the Flutter web bundle.
# Serves on :8080 per substrate convention.
# - /healthz: dependency-free liveness for Consul/Nomad healthcheck
# - hashed assets: long-lived immutable cache
# - everything else: SPA fallback to index.html with no-cache
# - logs JSON to stdout/stderr for the substrate scraper
#
# This file is dropped at /etc/nginx/conf.d/default.conf, which the
# stock nginx image includes from the http{} context. `log_format`
# only parses at that http{} scope — keep it outside the server{}
# block below.

log_format json_combined escape=json
  '{'
    '"ts":"$time_iso8601",'
    '"level":"info",'
    '"msg":"access",'
    '"app":"dz-escurel-explore",'
    '"remote":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"ua":"$http_user_agent",'
    '"rt":$request_time'
  '}';

server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Liveness — never touches dependencies, never hits the filesystem.
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Build version surface for the substrate /version contract. The
  # actual version lives in index.html's bundled --dart-define;
  # this endpoint just confirms the image is wired up.
  location = /version {
    add_header Content-Type text/plain;
    return 200 "escurel-explore nginx-edge\n";
  }

  # Hashed Flutter assets: immutable, cache aggressively.
  location ~* \.(js|css|woff2|png|svg|ico|wasm)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback for everything else (go_router deep links must
  # all hit index.html so the router can match client-side).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  access_log /dev/stdout json_combined;
  error_log  /dev/stderr warn;
}
