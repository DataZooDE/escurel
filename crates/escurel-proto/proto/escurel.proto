// Escurel v1 gRPC surface. Mirrors the MCP tool surface plus the
// admin endpoints. Message bodies start minimal (just enough for
// the spec's signatures) and are fleshed out in subsequent PRs
// alongside the service implementation in escurel-server.
//
// Spec: docs/spec/protocol.md §gRPC service definition

syntax = "proto3";

package escurel.v1;

// --- shared --------------------------------------------------------

// Matches escurel-index `PageRef`. Empty string sentinels stand
// in for proto3's missing optional support: `slug = ""` ⇔ no slug,
// `page_type` is always one of "skill" | "instance".
message PageRef {
  string page_id = 1;
  string slug = 2;
  string skill = 3;
  string page_type = 4;
}

// Each segment is empty-string-as-null. A bare `[[id]]` arrives as
// `{ id = "id" }`; the parser fills the rest.
message WikilinkParsed {
  string skill = 1;
  string id = 2;
  string anchor = 3;
  string version = 4;
  string alias = 5;
}

// --- agent surface (Escurel) --------------------------------------

message SearchRequest {
  string q = 1;
  // `k = 0` → server default of 10.
  uint32 k = 2;
  // `granularity` reserved for future page-level results; today
  // search is block-only and the response always reports "block".
  string granularity = 3;
  // "skill", "instance", "any", or empty (treated as "any").
  string page_type = 4;
  string skill = 5;
  // Reserved for the post-filter; not honoured yet.
  string filter_json = 6;
}

// One block-granularity hit. Mirrors escurel-index `SearchHit`.
message SearchHit {
  string page_id = 1;
  string slug = 2;
  string skill = 3;
  string page_type = 4;
  string anchor = 5;
  string snippet = 6;
  // RRF-fused score.
  double score = 7;
  // Frontmatter projected as a JSON object string.
  string frontmatter_excerpt_json = 8;
}

message SearchResponse {
  repeated SearchHit hits = 1;
  string granularity = 2;
}

message ResolveRequest { string wikilink = 1; }
message ResolveResponse {
  WikilinkParsed parsed = 1;
  PageRef page = 2;
  bool exists = 3;
}

message ExpandRequest {
  string page_id = 1;
  string anchor = 2;
  string version = 3;
}

message ExpandBlock {
  string anchor = 1;
  string content = 2;
}

message ExpandResponse {
  PageRef page = 1;
  string frontmatter_json = 2;
  string body = 3;
  repeated ExpandBlock blocks = 4;
  repeated WikilinkParsed wikilinks_out = 5;
  string snapshot_version = 6;
}

message NeighboursRequest {
  string page_id = 1;
  // "in", "out", or "both" (empty = "both").
  string direction = 2;
  string link_skill = 3;
  // Reserved; not honoured by today's indexer.
  repeated string link_skill_in = 4;
  string order_by = 5;
  uint32 limit = 6;
}

// One edge. Mirrors escurel-index `Edge`: src/dst are the
// stored ids (slugs), not full PageRefs. Empty `dst_anchor` /
// `link_version` mean "absent" (proto3 has no nullable strings).
message Edge {
  string src_page = 1;
  string dst_page = 2;
  string link_skill = 3;
  string link_version = 4;
  string dst_anchor = 5;
}

message NeighboursResponse { repeated Edge edges = 1; }

message ListSkillsRequest {}
message Skill {
  string id = 1;
  string description = 2;
  repeated string required_frontmatter = 3;
  repeated string optional_frontmatter = 4;
  bool is_event_typed = 5;
}
message ListSkillsResponse { repeated Skill skills = 1; }

// `order_by_at` is "asc", "desc", or "" (none); `limit = 0` means
// no limit. The dispatcher caps internally at 10000.
message ListInstancesRequest {
  string skill = 1;
  string order_by_at = 2;
  uint32 limit = 3;
}
message InstanceInfo {
  string page_id = 1;
  string skill = 2;
  string frontmatter_json = 3;
  string at = 4;
}
message ListInstancesResponse { repeated InstanceInfo instances = 1; }

message RunStoredQueryRequest {
  // `query_id` matches `[[query::<id>]]` in the spec.
  string query_id = 1;
  // JSON object {param_name: value, ...}; values are passed
  // through to DuckDB's typed binding.
  string params_json = 2;
}
message StoredQueryColumn {
  string name = 1;
  string type_name = 2;
}
message RunStoredQueryResponse {
  // JSON array of row objects.
  string rows_json = 1;
  repeated StoredQueryColumn schema = 2;
}

message ValidateRequest {
  string page_id = 1;
  string content = 2;
}
message ValidationIssue {
  string code = 1;
  string message = 2;
  string anchor = 3;
}
message ValidateResponse {
  bool ok = 1;
  repeated ValidationIssue issues = 2;
}

message UpdatePageRequest {
  // Repository-relative path under the tenant's lane, e.g.
  // `markdown/instances/customer/acme.md`. Doubles as the page
  // identity in the indexer today.
  string page_id = 1;
  string content = 2;
}
message UpdatePageResponse {
  bool ok = 1;
  // Empty until the M4 validate layer lands.
  repeated ValidationIssue issues = 2;
  // Stub version (`"v1"`) until the CRDT layer assigns monotonic
  // versions.
  string new_version = 3;
}

// Live session bidi stream. Stubbed in M3; comes alive in M4.
message LiveOp {
  string session = 1;
  bytes op = 2;
}
message LiveAck {
  string session = 1;
  string merged_version = 2;
  string content = 3;
  repeated ValidationIssue issues = 4;
}

// --- chat-history (M-Chat, issue #63) ----------------------------
//
// `append_message` + `list_messages` write/read an append-mostly
// per-chat-group conversation log distinct from the typed-instance
// KB. Optional embedding via `embed` lets high-volume sources skip
// the cost. `chat_group_id` is opaque to escurel — consumers
// (e.g. Carl) own the identifier scheme.

message ChatMessage {
  string chat_group_id = 1;
  string msg_id        = 2;
  // RFC-3339 in UTC, e.g. `2026-05-25T10:00:00Z`.
  string ts            = 3;
  // `user` | `assistant` | `system` | `tool`.
  string role          = 4;
  // Empty string when not set (proto3 has no nullable string).
  string author        = 5;
  string content       = 6;
  // Empty string when the row carries no metadata; otherwise a JSON
  // object encoded as a string (mirrors `frontmatter_excerpt_json`
  // on `SearchHit`).
  string metadata_json = 7;
  bool   embedded      = 8;
}

message AppendMessageRequest {
  string chat_group_id = 1;
  string role          = 2;
  string content       = 3;
  // Empty string means unset.
  string author        = 4;
  // Empty string means "stamp at insert time".
  string ts            = 5;
  // JSON object string, or empty.
  string metadata_json = 6;
  // Empty string means "server-generated ULID".
  string msg_id        = 7;
  // Whether to embed the content. The HTTP MCP transport models
  // this as an optional `embed` field defaulting to `true`; the
  // proto needs an explicit boolean.
  bool   embed         = 8;
}

message AppendMessageResponse {
  // The resolved msg_id (server-generated when the request omitted
  // it) and timestamp (server CURRENT_TIMESTAMP when the request
  // omitted it). Mirrors the MCP `{msg_id, ts}` ack envelope.
  string msg_id = 1;
  string ts     = 2;
}

message ListMessagesRequest {
  string chat_group_id = 1;
  // Inclusive lower bound; empty string disables.
  string since         = 2;
  // Exclusive upper bound; empty string disables.
  string until         = 3;
  // `0` → server default (100); hard cap is 1000.
  uint32 limit         = 4;
  // Opaque cursor from a prior `next_cursor`; empty string is "start".
  string cursor        = 5;
  // `asc` (default) | `desc`. Empty → `desc` to match the MCP default.
  string direction     = 6;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
  // Empty string means "no further pages".
  string next_cursor = 2;
}

service Escurel {
  rpc Search        (SearchRequest)         returns (SearchResponse);
  rpc Resolve       (ResolveRequest)        returns (ResolveResponse);
  rpc Expand        (ExpandRequest)         returns (ExpandResponse);
  rpc Neighbours    (NeighboursRequest)     returns (NeighboursResponse);
  rpc ListSkills    (ListSkillsRequest)     returns (ListSkillsResponse);
  rpc ListInstances (ListInstancesRequest)  returns (ListInstancesResponse);
  rpc RunStoredQuery(RunStoredQueryRequest) returns (RunStoredQueryResponse);
  rpc Validate      (ValidateRequest)       returns (ValidateResponse);
  rpc UpdatePage    (UpdatePageRequest)     returns (UpdatePageResponse);

  rpc AppendMessage (AppendMessageRequest)  returns (AppendMessageResponse);
  rpc ListMessages  (ListMessagesRequest)   returns (ListMessagesResponse);

  rpc LiveSession   (stream LiveOp)         returns (stream LiveAck);
}

// --- admin surface (EscurelAdmin) ---------------------------------

message TenantSpec {
  string tenant_id = 1;
  string display_name = 2;
}

message TenantCreateRequest  { TenantSpec spec = 1; }
message TenantCreateResponse { TenantSpec spec = 1; }
message TenantListRequest    {}
message TenantListResponse   { repeated TenantSpec tenants = 1; }
message TenantGetRequest     { string tenant_id = 1; }
message TenantGetResponse    { TenantSpec spec = 1; }
message TenantUpdateRequest  { TenantSpec spec = 1; }
message TenantUpdateResponse { TenantSpec spec = 1; }
message TenantDeleteRequest  { string tenant_id = 1; }
message TenantDeleteResponse { bool deleted = 1; }

message TenantExportRequest  { string tenant_id = 1; }
message TenantExportChunk    { bytes data = 1; }

message TenantImportChunk    {
  string tenant_id = 1;
  bytes data = 2;
}
message TenantImportResponse { uint64 bytes_imported = 1; }

message AuditRequest         { string tenant_id = 1; string scope = 2; }
message AuditResponse {
  repeated string markdown_not_in_duckdb = 1;
  repeated string indexed_but_no_markdown = 2;
}

message RebuildRequest       { string tenant_id = 1; string scope = 2; }
message RebuildProgress      {
  uint64 done = 1;
  uint64 total = 2;
  string current_page = 3;
}

message AttachExternalRequest {
  string tenant_id = 1;
  string source_url = 2;
}
message AttachExternalResponse { string source_id = 1; }

message EmbeddingReloadRequest  {}
message EmbeddingReloadResponse { string model_revision = 1; }

message CompactLanesRequest    { string tenant_id = 1; }
message CompactProgress {
  uint64 ops_compacted = 1;
  uint64 bytes_reclaimed = 2;
}

message QuotaGetRequest        { string tenant_id = 1; }
message QuotaGetResponse {
  uint32 queries_remaining = 1;
  uint32 writes_remaining = 2;
  uint32 embeds_remaining = 3;
  uint32 concurrent_sessions = 4;
}

message HealthRequest          {}
message HealthResponse {
  string status = 1;
  string version = 2;
}

service EscurelAdmin {
  rpc TenantCreate   (TenantCreateRequest)   returns (TenantCreateResponse);
  rpc TenantList     (TenantListRequest)     returns (TenantListResponse);
  rpc TenantGet      (TenantGetRequest)      returns (TenantGetResponse);
  rpc TenantUpdate   (TenantUpdateRequest)   returns (TenantUpdateResponse);
  rpc TenantDelete   (TenantDeleteRequest)   returns (TenantDeleteResponse);

  rpc TenantExport   (TenantExportRequest)   returns (stream TenantExportChunk);
  rpc TenantImport   (stream TenantImportChunk) returns (TenantImportResponse);

  rpc Audit          (AuditRequest)          returns (AuditResponse);
  rpc Rebuild        (RebuildRequest)        returns (stream RebuildProgress);

  rpc AttachExternal (AttachExternalRequest) returns (AttachExternalResponse);
  rpc EmbeddingReload(EmbeddingReloadRequest) returns (EmbeddingReloadResponse);
  rpc CompactLanes   (CompactLanesRequest)   returns (stream CompactProgress);

  rpc QuotaGet       (QuotaGetRequest)       returns (QuotaGetResponse);
  rpc Health         (HealthRequest)         returns (HealthResponse);
}
