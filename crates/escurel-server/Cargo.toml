[package]
name = "escurel-server"
description = "HTTP gateway for Escurel: health, MCP-over-HTTP, WebSocket."
edition.workspace = true
rust-version.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
base64 = "0.22"
dashmap = "6"
escurel-admin = { path = "../escurel-admin" }
escurel-auth = { path = "../escurel-auth" }
escurel-crdt = { path = "../escurel-crdt" }
futures = "0.3"
escurel-embed = { path = "../escurel-embed" }
escurel-index = { path = "../escurel-index" }
escurel-md = { path = "../escurel-md" }
escurel-obs = { path = "../escurel-obs" }
escurel-proto = { path = "../escurel-proto" }
escurel-quota = { path = "../escurel-quota" }
escurel-storage = { path = "../escurel-storage" }
flate2 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tar = "0.4"
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time"] }
tokio-stream = { version = "0.1", features = ["net", "sync"] }
tonic = { version = "0.12", default-features = false, features = ["codegen", "prost", "transport"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
ulid = "1"

[dev-dependencies]
async-trait = "0.1"
base64 = "0.22"
duckdb = { version = "1", features = ["bundled"] }
escurel-admin = { path = "../escurel-admin" }
escurel-crdt = { path = "../escurel-crdt" }
escurel-obs = { path = "../escurel-obs" }
escurel-proto = { path = "../escurel-proto" }
escurel-test-support = { path = "../escurel-test-support" }
futures = "0.3"
loro = "1.12"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-stream = "0.1"
tokio-tungstenite = "0.24"
tonic = { version = "0.12", default-features = false, features = ["codegen", "prost", "transport"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["registry"] }

[lints]
workspace = true
