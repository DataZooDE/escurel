[package]
name = "escurel-server"
description = "HTTP gateway for Escurel: health, MCP-over-HTTP, WebSocket."
edition.workspace = true
rust-version.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
escurel-admin = { path = "../escurel-admin" }
escurel-auth = { path = "../escurel-auth" }
futures = "0.3"
escurel-embed = { path = "../escurel-embed" }
escurel-index = { path = "../escurel-index" }
escurel-md = { path = "../escurel-md" }
escurel-proto = { path = "../escurel-proto" }
escurel-quota = { path = "../escurel-quota" }
escurel-storage = { path = "../escurel-storage" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time"] }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = { version = "0.12", default-features = false, features = ["codegen", "prost", "transport"] }
tower = "0.5"

[dev-dependencies]
async-trait = "0.1"
base64 = "0.22"
bytes = "1"
duckdb = { version = "1", features = ["bundled"] }
escurel-admin = { path = "../escurel-admin" }
escurel-proto = { path = "../escurel-proto" }
jsonwebtoken = "9"
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rsa = { version = "0.9", features = ["pem"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-tungstenite = "0.24"
tonic = { version = "0.12", default-features = false, features = ["codegen", "prost", "transport"] }
wiremock = "0.6"

[lints]
workspace = true
