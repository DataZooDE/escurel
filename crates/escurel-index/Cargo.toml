[package]
name = "escurel-index"
description = "DuckDB-backed index for Escurel: relational + vss + fts + CRDT op log."
edition.workspace = true
rust-version.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
# Bundled DuckDB: vendored C++ build, no system libduckdb required.
# Uses the `cc` backend (cargo-orchestrated parallel compile) — the
# alternative `bundled-cmake` backend cannot be used from the
# crates.io release because the release ships only the cc-backend
# amalgamation, not the CMake source tree. See
# docs/notes/discovered/2026-05-24-duckdb-bundled-cmake-ninja.md.
# Cold compile ~2–3 min on a parallel host; cached by
# Swatinem/rust-cache for ~30s on subsequent CI runs.
duckdb = { version = "1", features = ["bundled"] }
anyhow = "1"
async-trait = "0.1"
# `escurel-crdt` is pulled in solely so we can implement its
# `CitationLookup` trait on top of the `Indexer`'s DuckDB
# connection (see `citation.rs`). This is the only escurel-crdt
# surface we touch — the dep is one-way and does NOT create a
# cycle (escurel-crdt does not depend on escurel-index).
escurel-crdt = { path = "../escurel-crdt" }
escurel-embed = { path = "../escurel-embed" }
escurel-md = { path = "../escurel-md" }
escurel-storage = { path = "../escurel-storage" }
bytes = "1"
regex = "1"
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["rt", "sync"] }
# ULID for server-generated chat_messages.msg_id when the caller
# omits it. Crockford base32, 26 chars, lexicographically sortable
# by encoded timestamp.
ulid = "1"
# Base64 cursor encoding for list_chat_messages pagination.
base64 = "0.22"

[dev-dependencies]
bytes = "1"
escurel-embed = { path = "../escurel-embed" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
