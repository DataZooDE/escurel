[package]
name = "escurel-client"
description = "Typed RPC client for the Escurel v1 surface, built on escurel-proto. Leaf crate — no escurel-server / DuckDB / candle in the dependency tree."
edition.workspace = true
rust-version.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
escurel-proto = { path = "../escurel-proto" }
secrecy = "0.10"
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["rt"] }
tonic = { version = "0.12", default-features = false, features = [
    "codegen",
    "prost",
    "transport",
] }

[dev-dependencies]
base64 = "0.22"
bytes = "1"
duckdb = { version = "1", features = ["bundled"] }
escurel-auth = { path = "../escurel-auth" }
escurel-embed = { path = "../escurel-embed" }
escurel-index = { path = "../escurel-index" }
escurel-server = { path = "../escurel-server" }
escurel-storage = { path = "../escurel-storage" }
jsonwebtoken = "9"
rand = "0.8"
rsa = { version = "0.9", features = ["pem"] }
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
wiremock = "0.6"

[lints]
workspace = true
