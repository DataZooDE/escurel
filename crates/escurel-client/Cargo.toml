[package]
name = "escurel-client"
description = "Typed RPC client for the Escurel v1 surface, built on escurel-proto. Leaf crate — no escurel-server / DuckDB / candle in the dependency tree."
edition.workspace = true
rust-version.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
escurel-proto = { path = "../escurel-proto" }
secrecy = "0.10"
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["rt"] }
tonic = { version = "0.12", default-features = false, features = [
    "codegen",
    "prost",
    "transport",
] }

[dev-dependencies]
escurel-test-support = { path = "../escurel-test-support" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tonic = { version = "0.12", default-features = false, features = [
    "codegen",
    "prost",
    "transport",
] }

[lints]
workspace = true
