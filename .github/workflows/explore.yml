name: explore

# explore.yml — Flutter web companion app pipeline (escurel-explore).
#
# Independent of the Rust ci.yml (paused during bootstrap; see CLAUDE.md
# principle 2). Scoped via `paths:` so unrelated changes don't trigger
# Flutter setup.
#
# Image: europe-west3-docker.pkg.dev/hetzner-agent-backplane/substrate/escurel-explore
#
# Auth: GitHub OIDC → GCP Workload Identity Federation → GAR push.
# No static cloud keys (substrate locked decision). Mirrors the
# substrate-side `build-app-image.yml` pattern (ref-18-app-image-pipeline.md)
# but lives here because the source code lives here. The substrate's WIF
# binding must trust this repo (DataZooDE/escurel) in addition to the
# substrate repo — see bootstrap/main.tf attribute_condition.
#
# Tag scheme (same as substrate-side):
#   :<12-char-sha>   — always pushed; what ops/base-jobs.manifest pins.
#   :main            — moving pointer; pushed on a push to main branch only.
#   :vX.Y.Z          — pushed on a `v*` git tag push.
#
# No :latest; no auto-PR manifest bump (cross-repo PR is operator-driven for
# now — the operator updates ops/base-jobs.manifest in the substrate repo
# after this workflow pushes a new SHA, then runs /release-app from there).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/escurel-explore/**'
      - 'examples/crm-demo/**'
      - '.github/workflows/explore.yml'
    tags:
      - 'v*'

concurrency:
  group: explore-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write       # WIF auth to GCP

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/escurel-explore

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      # `flutter pub get` also generates pubspec.lock in the working tree,
      # which the Dockerfile COPYs (the lockfile is .gitignored; the build
      # context must produce it). See docs/notes/discovered/
      # 2026-05-28-nginx-log-format-in-server.md for the parallel runtime
      # gotcha that lives in this same image.
      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test --reporter expanded

      - name: flutter build web
        run: |
          flutter build web --release \
            --dart-define=ESCUREL_EXPLORE_MODE=fixture \
            --dart-define=ESCUREL_EXPLORE_VERSION=${GITHUB_SHA::12}

      # WIF auth to GCP — substrate's `tf-bootstrap` SA (impersonated by
      # GitHub Actions). Vars are set on this repo via `gh variable set`;
      # the WIF binding in substrate bootstrap/main.tf must include this
      # repo for impersonation to succeed.
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          GAR="europe-west3-docker.pkg.dev/hetzner-agent-backplane/substrate/escurel-explore"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${GAR}:${SHORT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${GAR}:main"
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${GAR}:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS"        >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT"  >> "$GITHUB_OUTPUT"
          echo "image_full=${GAR}:${SHORT}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Image tags::$TAGS"

      - name: Build + push to GAR
        uses: docker/build-push-action@v6
        with:
          context: apps/escurel-explore
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.tags.outputs.short_sha }}
            ESCUREL_EXPLORE_MODE=fixture
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "## escurel-explore image"
            echo ""
            echo "Pushed: \`${{ steps.tags.outputs.image_full }}\`"
            echo ""
            echo "### Operator next steps (substrate repo)"
            echo ""
            echo "1. Bump \`ops/base-jobs.manifest\` line for \`escurel-explore.nomad.hcl\`"
            echo "   to pin \`:${{ steps.tags.outputs.short_sha }}\`."
            echo "2. \`/release-app escurel-explore nonprod\`"
          } >> "$GITHUB_STEP_SUMMARY"
