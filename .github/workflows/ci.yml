name: CI

# Re-enabled at v1.0.0 (M6). During bootstrap CI was paused
# (`workflow_dispatch` only) and the local four-command gate
# (`cargo fmt` / `clippy -D warnings` / `test` / `build --release`)
# was the merge gate per CLAUDE.md "How we work". With the workspace
# stabilised at v1 the GitHub Actions safety net is back on for
# every push to main and every PR.
# Platform coverage:
#   * Linux (`ci` job) runs on every PR, every push to main, and every
#     release tag — it is the full fmt/clippy/test/build gate.
#   * Windows + macOS (`release-build` job) build the release binaries
#     ONLY for releases (a `v*` tag push), not on PRs. PRs stay
#     Linux-only so the cross-platform link cost is paid once per release
#     rather than on every push.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short
  # The workspace statically links libduckdb into ~15 test
  # binaries. Linking them with full debuginfo, in parallel, blows
  # past the 7 GB on a GitHub-hosted runner — the first re-enabled
  # CI run got SIGTERM'd (exit 143) mid-link before any test ran.
  # Drop test/dev debuginfo (duckdb's is enormous) and serialise
  # build jobs to cap peak link memory. CI-only; the committed
  # profiles and local dev builds are untouched.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_BUILD_JOBS: "1"

jobs:
  ci:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    # DuckDB is no longer compiled from source — libduckdb-sys downloads
    # the precompiled libduckdb (see .cargo/config.toml: DUCKDB_DOWNLOAD_LIB).
    # `CARGO_BUILD_JOBS=1` (the link-memory cap, see env above) still
    # serialises linking, so keep generous headroom for the release stage.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml drives the channel + components; rustup
      # honours it automatically on first invocation.
      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Bumped from `workspace` to invalidate caches that hold the
          # libduckdb-sys build-script fingerprint but NOT the downloaded
          # libduckdb (the old caches link-fail with `cannot find -lduckdb`).
          shared-key: workspace-duckdb-dl
          # The build script downloads libduckdb into this custom dir and
          # bakes its path into the cached link-search output. It is NOT a
          # standard cargo artifact, so cache it explicitly — otherwise a
          # cache hit restores the fingerprint (script does not re-run) but
          # not the .so, and the final test/release link fails.
          cache-directories: target/duckdb-download
          # Save the cache even when a later step fails — without this, a
          # single test failure throws away the warm cache and every push
          # re-pays the cold dependency build.
          cache-on-failure: true

      # Safety net for cache restores that lack the downloaded libduckdb
      # (e.g. an older cache, or a partial restore): the libduckdb-sys
      # build script only re-downloads when it actually re-runs, so force
      # that by cleaning just that crate when the .so is absent.
      - name: Ensure libduckdb is present (cache-restore safety)
        run: |
          if ! ls target/duckdb-download/*/*/libduckdb.so >/dev/null 2>&1; then
            echo "libduckdb not in restored cache — forcing libduckdb-sys rebuild"
            cargo clean -p libduckdb-sys || true
          fi

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo build --release
        run: cargo build --workspace --release

  # Release-only cross-platform binaries. Gated on `v*` tag pushes, so PRs
  # and main pushes never trigger it — they get the Linux `ci` job only.
  release-build:
    name: release build (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel (1.91.0, minimal profile);
      # a release build needs neither rustfmt nor clippy.
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}
          # Same libduckdb-download caching contract as the Linux job: the
          # build script bakes this path into its cached link-search output,
          # so cache it explicitly or a warm-fingerprint/cold-lib restore
          # link-fails (see the safety step below).
          cache-directories: target/duckdb-download
          cache-on-failure: true

      # Cross-platform mirror of the Linux safety net: if the cache restored
      # the libduckdb-sys fingerprint but not the downloaded lib (.dll on
      # Windows, .dylib on macOS), force the build script to re-download.
      - name: Ensure libduckdb is present (cache-restore safety)
        shell: bash
        run: |
          if ! ls target/duckdb-download/*/*/libduckdb.* >/dev/null 2>&1; then
            echo "libduckdb not in restored cache — forcing libduckdb-sys rebuild"
            cargo clean -p libduckdb-sys || true
          fi

      - name: cargo build --release
        run: cargo build --workspace --release
